# DriveFlow — Production Nginx Configuration
# Place at: /etc/nginx/sites-available/driveflow
# Enable with: ln -s /etc/nginx/sites-available/driveflow /etc/nginx/sites-enabled/driveflow
# Test + reload: nginx -t && systemctl reload nginx
#
# Prérequis:
#   openssl dhparam -out /etc/nginx/dhparam.pem 2048
#   Certbot/Let's Encrypt: certbot --nginx -d api.driveflow.yourdomain.com -d app.driveflow.yourdomain.com
#
# Assumptions:
#   - Laravel public root: /var/www/driveflow/backend/public
#   - Frontend static build: /var/www/driveflow/frontend/dist
#   - PHP-FPM socket: /run/php/php8.2-fpm.sock

# ── Rate limiting zones (à déclarer dans http{} ou ici si inclus dans http{}) ──
# Si ce fichier est dans sites-available/, déplacer ces directives dans /etc/nginx/nginx.conf
# dans le bloc http{} global. Elles ne peuvent pas être dans un bloc server{}.
#
# limit_req_zone $binary_remote_addr zone=driveflow_login:10m rate=5r/m;
# limit_req_zone $binary_remote_addr zone=driveflow_api:10m   rate=120r/m;
# limit_conn_zone $binary_remote_addr zone=driveflow_conn:10m;
#
# Décommenter et ajouter dans /etc/nginx/nginx.conf → http { ... }

# ─── API Server ──────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name api.driveflow.yourdomain.com;
    server_tokens off;

    root  /var/www/driveflow/backend/public;
    index index.php;

    # ── TLS (Mozilla Intermediate — https://ssl-config.mozilla.org/) ──────────
    ssl_certificate     /etc/letsencrypt/live/api.driveflow.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.driveflow.yourdomain.com/privkey.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;
    ssl_dhparam               /etc/nginx/dhparam.pem;

    # OCSP stapling
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout    5s;

    # ── Security headers (always = présents même sur 4xx/5xx) ─────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    nosniff                               always;
    add_header X-Frame-Options           DENY                                  always;
    add_header Referrer-Policy           strict-origin-when-cross-origin       always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;
    # X-XSS-Protection est obsolète (Chrome l'ignore) mais inoffensif
    add_header X-XSS-Protection         "1; mode=block"                       always;

    # ── Upload ────────────────────────────────────────────────────────────────
    client_max_body_size    50M;
    client_body_timeout     30s;
    client_header_timeout   10s;
    keepalive_timeout       30s;
    send_timeout            30s;

    # ── Connexions abusives ───────────────────────────────────────────────────
    # Décommenter si limit_conn_zone est défini dans nginx.conf global:
    # limit_conn driveflow_conn 30;

    # ── Fichiers sensibles — bloquer AVANT les blocs PHP ─────────────────────
    location ~* /\.(env|git|gitignore|gitattributes|htaccess|htpasswd)$ {
        deny all;
        return 404;
    }
    location = /composer.json  { deny all; return 404; }
    location = /composer.lock  { deny all; return 404; }
    location = /artisan        { deny all; return 404; }
    location ~* /vendor/       { deny all; return 404; }

    # ── /storage/ : PAS de serving direct — fichiers sensibles (KYC, PDFs) ───
    # Les téléchargements passent par Laravel (auth:sanctum + contrôleur).
    location /storage/ {
        deny all;
        return 403;
    }

    # ── Rate limiting sur auth (décommenter si zones définies globalement) ────
    # location ~* ^/api/v1/auth/(login|password) {
    #     limit_req zone=driveflow_login burst=5 nodelay;
    #     try_files $uri $uri/ /index.php?$query_string;
    # }

    # ── Routes applicatives ───────────────────────────────────────────────────
    location / {
        # limit_req zone=driveflow_api burst=30 nodelay;
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass            unix:/run/php/php8.2-fpm.sock;
        fastcgi_index           index.php;
        fastcgi_param           SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include                 fastcgi_params;
        fastcgi_read_timeout    120;
        fastcgi_buffers         16 16k;
        fastcgi_buffer_size     32k;
        fastcgi_hide_header     X-Powered-By;
    }

    access_log /var/log/nginx/driveflow-api-access.log;
    error_log  /var/log/nginx/driveflow-api-error.log  warn;
}

# ─── Frontend SPA ─────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name app.driveflow.yourdomain.com;
    server_tokens off;

    root  /var/www/driveflow/frontend/dist;
    index index.html;

    ssl_certificate     /etc/letsencrypt/live/app.driveflow.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.driveflow.yourdomain.com/privkey.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;
    ssl_dhparam               /etc/nginx/dhparam.pem;
    ssl_stapling              on;
    ssl_stapling_verify       on;
    resolver                  1.1.1.1 8.8.8.8 valid=300s;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    nosniff                               always;
    add_header X-Frame-Options           DENY                                  always;
    add_header Referrer-Policy           strict-origin-when-cross-origin       always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;

    # CSP — adapter connect-src à l'URL réelle de l'API
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self' https://api.driveflow.yourdomain.com; frame-ancestors 'none';" always;

    client_body_timeout   12s;
    client_header_timeout 12s;
    keepalive_timeout     30s;

    # Assets Vite (hash dans le nom) — cache long terme
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        access_log off;
    }

    # SPA fallback — React Router gère le routing côté client
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Bloquer tentatives de traversée
    location ~* /\.(env|git|htaccess)$ {
        deny all;
        return 404;
    }

    access_log /var/log/nginx/driveflow-app-access.log;
    error_log  /var/log/nginx/driveflow-app-error.log warn;
}

# ─── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    server_name api.driveflow.yourdomain.com app.driveflow.yourdomain.com;
    server_tokens off;

    # ACME challenge pour Certbot (renouvellement Let's Encrypt)
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
