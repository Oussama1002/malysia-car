# DriveFlow — Production Apache VirtualHost Configuration
# For servers running Apache 2.4 with mod_rewrite + mod_proxy_fcgi
# Place at: /etc/apache2/sites-available/driveflow.conf
# Enable with: a2ensite driveflow && systemctl reload apache2
#
# Required modules: a2enmod rewrite ssl headers proxy_fcgi
# PHP-FPM config: /etc/php/8.2/fpm/pool.d/www.conf

<VirtualHost *:443>
    ServerName api.driveflow.yourdomain.com
    DocumentRoot /var/www/driveflow/backend/public

    SSLEngine on
    SSLCertificateFile    /etc/letsencrypt/live/api.driveflow.yourdomain.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/api.driveflow.yourdomain.com/privkey.pem

    # PHP-FPM
    <FilesMatch \.php$>
        SetHandler "proxy:unix:/run/php/php8.2-fpm.sock|fcgi://localhost"
    </FilesMatch>

    <Directory /var/www/driveflow/backend/public>
        AllowOverride All
        Require all granted
        Options -Indexes
    </Directory>

    # File upload limit
    LimitRequestBody 52428800

    # Security headers
    Header always set X-Content-Type-Options  nosniff
    Header always set X-Frame-Options         DENY
    Header always set X-XSS-Protection        "1; mode=block"
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
    Header always set Referrer-Policy         strict-origin-when-cross-origin

    # Block sensitive files
    <FilesMatch "\.(env|git|htaccess)$">
        Require all denied
    </FilesMatch>

    ErrorLog  /var/log/apache2/driveflow-api-error.log
    CustomLog /var/log/apache2/driveflow-api-access.log combined
</VirtualHost>

<VirtualHost *:443>
    ServerName app.driveflow.yourdomain.com
    DocumentRoot /var/www/driveflow/frontend/dist

    SSLEngine on
    SSLCertificateFile    /etc/letsencrypt/live/app.driveflow.yourdomain.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/app.driveflow.yourdomain.com/privkey.pem

    <Directory /var/www/driveflow/frontend/dist>
        AllowOverride All
        Require all granted
        Options -Indexes
        # SPA fallback
        FallbackResource /index.html
    </Directory>

    Header always set X-Content-Type-Options  nosniff
    Header always set X-Frame-Options         DENY
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"

    # Cache hashed Vite assets
    <LocationMatch "^/assets/">
        Header set Cache-Control "public, max-age=31536000, immutable"
    </LocationMatch>

    ErrorLog  /var/log/apache2/driveflow-app-error.log
    CustomLog /var/log/apache2/driveflow-app-access.log combined
</VirtualHost>

# HTTP → HTTPS
<VirtualHost *:80>
    ServerName api.driveflow.yourdomain.com
    Redirect permanent / https://api.driveflow.yourdomain.com/
</VirtualHost>

<VirtualHost *:80>
    ServerName app.driveflow.yourdomain.com
    Redirect permanent / https://app.driveflow.yourdomain.com/
</VirtualHost>
