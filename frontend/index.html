<!DOCTYPE html>
<html lang="fr" data-theme="light" data-density="comfort">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0B1020" />
  <title>DriveFlow OS — Automobile & Leasing</title>

  <!-- Preconnect to fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Typography: Inter (UI), JetBrains Mono (numbers), IBM Plex Sans Arabic (RTL) -->
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <!-- Tailwind CDN with dark-mode class strategy -->
  <script>
    window.tailwind = window.tailwind || {};
    window.tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui'],
            mono: ['JetBrains Mono', 'ui-monospace', 'SFMono-Regular'],
            arabic: ['IBM Plex Sans Arabic', 'Inter', 'ui-sans-serif'],
          },
        },
      },
    };
  </script>
  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="stylesheet" href="/index.css" />
</head>
<body class="df-body">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
